name: Generate Snake

on:
  schedule:
    - cron: "0 0 * * *"   # daily
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Generate Snake
        uses: Platane/snk@v3
        with:
          github_user_name: ${{ github.repository_owner }}
          outputs: |
            dist/github-snake.svg?color_snake=#64FFDA&color_dots=#8892B0,#8892B0,#8892B0,#8892B0,#8892B0
            dist/github-snake-dark.svg?palette=github-dark&color_snake=#64FFDA&color_dots=#8892B0,#8892B0,#8892B0,#8892B0,#8892B0


      - name: Commit & Push
        run: |
          git config user.name github-actions
          git config user.email github-actions@github.com
          git add dist/
          git commit -m "generate snake" || echo "No changes"
          git push
